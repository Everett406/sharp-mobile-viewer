name: SHARP Inference

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID (format: sharp_timestamp_random4)'
        required: true
        type: string

env:
  RELEASE_TAG: splat-jobs
  PYTHON_VERSION: '3.11'

jobs:
  inference:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache SHARP environment (model + venv)
        uses: actions/cache@v4
        id: sharp-cache
        with:
          path: |
            /tmp/sharp-venv
            /tmp/ml-sharp
            ~/.cache/torch/hub/checkpoints
          key: sharp-env-v2
          restore-keys: |
            sharp-env-

      - name: Create venv and install SHARP (if not cached)
        if: steps.sharp-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv /tmp/sharp-venv
          source /tmp/sharp-venv/bin/activate
          git clone https://github.com/apple/ml-sharp.git /tmp/ml-sharp
          cd /tmp/ml-sharp
          pip install -r requirements.txt

      - name: Verify SHARP installation (if cached)
        if: steps.sharp-cache.outputs.cache-hit == 'true'
        run: |
          source /tmp/sharp-venv/bin/activate
          which sharp && echo "SHARP CLI found" || echo "SHARP CLI not found, will reinstall"
          if ! which sharp; then
            cd /tmp/ml-sharp
            pip install -r requirements.txt
          fi

      - name: Verify input image (with retry)
        run: |
          INPUT_FILE="jobs/input_${{ inputs.job_id }}.jpg"
          
          for i in 1 2 3 4 5 6; do
            if [ -f "$INPUT_FILE" ]; then
              FILE_SIZE=$(stat -c%s "$INPUT_FILE" 2>/dev/null || echo 0)
              echo "Found input file: $FILE_SIZE bytes"
              if [ "$FILE_SIZE" -lt 100 ]; then
                echo "ERROR: File too small ($FILE_SIZE bytes), retrying..."
              else
                echo "Input image verified: $FILE_SIZE bytes"
                break
              fi
            else
              echo "Attempt $i: File not found yet, pulling latest..."
              git pull origin main 2>/dev/null || true
            fi
            sleep 5
          done
          
          if [ ! -f "$INPUT_FILE" ]; then
            echo "ERROR: Input file not found after retries: $INPUT_FILE"
            ls -la jobs/ 2>/dev/null || echo "jobs/ directory does not exist"
            echo "Error: Input image not found in repo after 6 retries" > ${{ inputs.job_id }}.error.txt
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$INPUT_FILE" 2>/dev/null || echo 0)
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "ERROR: Input image is too small ($FILE_SIZE bytes)"
            echo "Error: Input image is empty or corrupted" > ${{ inputs.job_id }}.error.txt
            exit 1
          fi
          
          mkdir -p ${{ github.workspace }}/jobs/${{ inputs.job_id }}/output

      - name: Run SHARP inference (CPU)
        id: inference
        continue-on-error: true
        run: |
          source /tmp/sharp-venv/bin/activate
          cd /tmp/ml-sharp
          sharp predict \
            -i ${{ github.workspace }}/jobs \
            -o ${{ github.workspace }}/jobs/${{ inputs.job_id }}/output \
            --device cpu \
            -v

      - name: Upload PLY to Release (on success)
        if: steps.inference.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} --title "SHARP Splat Jobs" --notes "Auto-generated" --prerelease 2>/dev/null || true

          PLY_FILE=$(find jobs/${{ inputs.job_id }}/output -name "*.ply" | head -1)
          if [ -n "$PLY_FILE" ]; then
            PLY_SIZE=$(stat -c%s "$PLY_FILE" 2>/dev/null || echo 0)
            echo "PLY file size: $PLY_SIZE bytes"
            cp "$PLY_FILE" ${{ inputs.job_id }}.ply
            gh release upload ${{ env.RELEASE_TAG }} ${{ inputs.job_id }}.ply --clobber
            echo "PLY uploaded successfully"
          else
            echo "ERROR: No .ply file found in output"
            ls -la jobs/${{ inputs.job_id }}/output/
            echo "Error: No PLY file generated" > ${{ inputs.job_id }}.error.txt
            gh release upload ${{ env.RELEASE_TAG }} ${{ inputs.job_id }}.error.txt --clobber
          fi

      - name: Upload error info to Release (on failure)
        if: steps.inference.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} --title "SHARP Splat Jobs" --notes "Auto-generated" --prerelease 2>/dev/null || true
          echo "Error: SHARP inference failed" > ${{ inputs.job_id }}.error.txt
          echo "Step: run_sharp_inference" >> ${{ inputs.job_id }}.error.txt
          echo "Workflow: sharp.yml" >> ${{ inputs.job_id }}.error.txt
          echo "Run ID: ${{ github.run_id }}" >> ${{ inputs.job_id }}.error.txt
          echo "Repository: ${{ github.repository }}" >> ${{ inputs.job_id }}.error.txt
          echo "Job ID: ${{ inputs.job_id }}" >> ${{ inputs.job_id }}.error.txt
          gh release upload ${{ env.RELEASE_TAG }} ${{ inputs.job_id }}.error.txt --clobber

      - name: Clean up input file
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_FILE="jobs/input_${{ inputs.job_id }}.jpg"
          if [ -f "$INPUT_FILE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm "$INPUT_FILE"
            git commit -m "cleanup: remove input_${{ inputs.job_id }}.jpg"
            git push || echo "Push failed, file may already be removed"
            echo "Cleaned up input file"
          fi
