name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create Android project
        run: npx cap add android

      - name: Configure Android project
        run: |
          # Extract version from git tag (e.g., v0.7.0 → versionName=0.7.0, versionCode=70)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION_NAME="${TAG_NAME#v}"
          MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + PATCH))
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

          # 1. Copy Gyroscope plugin
          mkdir -p android/app/src/main/java/com/sharpmobile/app
          cp android-plugins/GyroscopePlugin.java android/app/src/main/java/com/sharpmobile/app/

          # 2. Replace MainActivity to register plugin
          cat > android/app/src/main/java/com/sharpmobile/app/MainActivity.java << 'JAVA'
          package com.sharpmobile.app;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(GyroscopePlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA

          # 3. Set version code/name in build.gradle
          sed -i "s/versionCode 1/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

          # 4. Allow screen rotation (fullSensor = both portrait and landscape)
          sed -i 's/android:screenOrientation="portrait"/android:screenOrientation="fullSensor"/' android/app/src/main/AndroidManifest.xml

          # 5. Generate app icon from source image
          pip install Pillow --break-system-packages -q
          python3 - << 'PYTHON'
          from PIL import Image
          import os

          src = Image.open('assets/app-icon.jpg').convert('RGBA')
          # Make a square 512x512 icon
          src = src.resize((512, 512), Image.LANCZOS)

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }
          for folder, size in sizes.items():
              path = f'android/app/src/main/res/{folder}/ic_launcher.png'
              os.makedirs(os.path.dirname(path), exist_ok=True)
              src.resize((size, size), Image.LANCZOS).save(path)
              # Round icon variant
              src.resize((size, size), Image.LANCZOS).save(path.replace('ic_launcher', 'ic_launcher_round'))

          # Foreground for adaptive icon (v26+)
          for folder in ['mipmap-anydpi-v26']:
              path = f'android/app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
          PYTHON

          # 6. Update AndroidManifest to use custom icon
          sed -i 's/@mipmap\/ic_launcher/@mipmap\/ic_launcher/g' android/app/src/main/AndroidManifest.xml

          echo "=== Android project configured ==="
          cat android/app/src/main/java/com/sharpmobile/app/MainActivity.java
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Copy web assets
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks

      - name: Create signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/app/signing.properties << EOF
          storeFile=release-key.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          KEYSTORE_ABS=$(realpath app/release-key.jks)
          echo "Keystore at: $KEYSTORE_ABS"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_ABS" \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find android -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK at: $APK_PATH"
            ls -lh "$APK_PATH"
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "Tag: $TAG_NAME"
            # Create release (if not exists) and upload APK
            gh release create "$TAG_NAME" "$APK_PATH" \
              --title "SharpView $TAG_NAME" \
              --notes "SharpView $TAG_NAME - APK download" \
              || gh release upload "$TAG_NAME" "$APK_PATH" --clobber
            echo "APK uploaded to release $TAG_NAME"
          else
            echo "ERROR: No APK found"
            find android -name "*.apk" -type f
            exit 1
          fi
