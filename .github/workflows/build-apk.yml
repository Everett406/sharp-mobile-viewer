name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create Android project
        run: npx cap add android

      - name: Copy web assets
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks

      - name: Create signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/app/signing.properties << EOF
          storeFile=release-key.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release-key.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find android -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK at: $APK_PATH"
            ls -lh "$APK_PATH"
            TAG_NAME=${GITHUB_REF#refs/tags/}
            # Try to create release, if it exists just upload the asset
            gh release create "$TAG_NAME" "$APK_PATH" \
              --title "SharpView $TAG_NAME" \
              --notes "## SharpView $TAG_NAME

          ### 下载安装
          1. 下载下方 APK 文件
          2. 在手机上允许安装未知来源应用
          3. 安装后打开 SharpView

          ### 首次使用
          1. 进入设置页配置 GitHub Token 和仓库信息
          2. 测试连接成功后即可使用" \
              --generate-notes 2>/dev/null || \
            gh release upload "$TAG_NAME" "$APK_PATH" --clobber
            echo "APK uploaded to release $TAG_NAME"
          else
            echo "ERROR: No APK found"
            find android -name "*.apk" -type f
            exit 1
          fi
